<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrežnica - Fotoalbum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="glavno-zaglavlje">
        <nav>
            <div class="logo-kontejner">
                <a href="index.html" class="logo">MREŽNICA<span>.</span></a>
                <div class="header-vrijeme"><span id="trenutni-dan-datum">...</span><span id="sat" class="sat-uzivo">00:00:00</span></div>
            </div>
            <div class="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Početna</a></li>
                <li><a href="autenticnost.html" class="nav-link">Autentičnost</a></li>
                <li><a href="ribolov.html" class="nav-link">Ribolov</a></li>
                <li><a href="istrazi.html" class="nav-link">Istraži</a></li>
                <li><a href="pravila.html" class="nav-link">Pravila</a></li>
                <li><a href="album.html" class="nav-link aktivni">Fotoalbum</a></li>
                <li><a href="clanovi.html" class="nav-link">Članovi</a></li>
            </ul>
        </nav>
    </header>

    <section>
        <h2 class="sekcija-naslov">Galerija Prirode</h2>
        
        <div class="album-filteri">
            <button class="filter-gumb aktivno" onclick="filtrirajGaleriju('sve')">Sve slike</button>
            <button class="filter-gumb" onclick="filtrirajGaleriju('slapovi')">Slapovi</button>
            <button class="filter-gumb" onclick="filtrirajGaleriju('tok')">Riječni tok</button>
        </div>

        <div class="galerija-grid">
            <div class="galerija-stavka slapovi">
                <img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=600&q=80" alt="Slap">
                <div class="galerija-naslov">Sedrena kaskada Šušnjar</div>
            </div>
            <div class="galerija-stavka tok">
                <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=600&q=80" alt="Kanjon">
                <div class="galerija-naslov">Mirni kanjon u gornjem toku</div>
            </div>
            <div class="galerija-stavka slapovi">
                <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=600&q=80" alt="Slapovi">
                <div class="galerija-naslov">Smaragdni prelijevači</div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Udruga Čuvari Mrežnice. | Design by <strong>Martina Kovačić</strong></p>
        </div>
    </footer>

    <script src="javascript.js"></script>
</body>
</html>
