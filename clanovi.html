<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrežnica - Članovi (Prijava)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="stranica-prijava">

    <header class="glavno-zaglavlje">
        <nav>
            <div class="logo-kontejner">
                <a href="index.html" class="logo">MREŽNICA</a>
            </div>
            <div class="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Početna</a></li>
                <li><a href="autenticnost.html" class="nav-link">Autentičnost</a></li>
                <li><a href="ribolov.html" class="nav-link">Ribolov</a></li>
                <li><a href="istrazi.html" class="nav-link">Istraži</a></li>
                <li><a href="pravila.html" class="nav-link">Pravila</a></li>
                <li><a href="album.html" class="nav-link">Fotoalbum</a></li>
                <li><a href="clanovi.html" class="nav-link aktivni">Članovi</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-sekcija">
        <div class="login-kartica">
            <h2>Admin Prijava</h2>
            <p class="login-opis">Pristup zaštićenom dijelu za članove udruge.</p>
            
            <form id="admin-login-forma" class="forma-login">
                <div class="input-grupa">
                    <label for="korisnik">Korisničko ime</label>
                    <input type="text" id="korisnik" placeholder="Unesite korisničko ime" required>
                </div>
                <div class="input-grupa">
                    <label for="lozinka">Lozinka</label>
                    <input type="password" id="lozinka" placeholder="Unesite lozinku" required>
                </div>
                <p id="login-poruka" class="skrivena-poruka"></p>
                <button type="submit" class="zeleni-btn">Prijavi se</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Udruga Čuvari Mrežnice. | Design by <strong>Martina Kovačić</strong></p>
        </div>
    </footer>

    <script src="javascript.js"></script>
</body>
</html>
